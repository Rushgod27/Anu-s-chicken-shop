<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Expense Management</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/expenses.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h2>📒 Expense Management</h2>

<div>

<h3>Add Expense</h3>

<input type="date" id="expDate">

<select id="expCategory">
<option value="rent">Rent</option>
<option value="salary">Salary</option>
<option value="electricity">Electricity</option>
<option value="transport">Transport</option>
<option value="misc">Misc</option>
</select>

<select id="expType">
<option value="fixed">Fixed</option>
<option value="variable">Variable</option>
</select>

<select id="expPayment">
<option value="cash">Cash</option>
<option value="online">Online</option>
</select>

<input type="number" id="expAmount" placeholder="Amount">

<input type="text" id="expNote" placeholder="Note">

<button onclick="addExpense()">Add Expense</button>

</div>

<br><br>

<div>

<h3>Monthly Summary</h3>

<div>
Fixed Expenses ₹ <span id="fixedTotal">0</span>
</div>

<div>
Variable Expenses ₹ <span id="variableTotal">0</span>
</div>

<div>
Total Expenses ₹ <span id="totalExpense">0</span>
</div>

<br>

<canvas id="expenseChart"></canvas>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";


initializeApp({
apiKey:"AIzaSyComVLxo36wvogoBFEoWyea-_yESW9BIPU",
authDomain:"anus-chicken-shop.firebaseapp.com",
projectId:"anus-chicken-shop"
});

const db = getFirestore();


/* DEFAULT DATE */

const today=new Date().toISOString().slice(0,10);

expDate.value=today;


/* ===============================
ADD EXPENSE
=============================== */

window.addExpense = async()=>{

const date=expDate.value;

const category=expCategory.value;

const type=expType.value;

const payment=expPayment.value;

const amount=+expAmount.value||0;

const note=expNote.value;

if(amount<=0){

alert("Enter valid amount");

return;

}

await addDoc(collection(db,"expenses"),{

date,
category,
expenseType:type,
payment,
amount,
note,
createdAt:serverTimestamp()

});

alert("Expense Added");

location.reload();

};


/* ===============================
LOAD MONTHLY EXPENSES
=============================== */

async function loadExpenses(){

const snap = await getDocs(collection(db,"expenses"));

const now = new Date();

const currentMonth = now.getMonth();

const currentYear = now.getFullYear();

let fixed = 0;

let variable = 0;

snap.forEach(d=>{

const e=d.data();

const expDate=new Date(e.date);

if(
expDate.getMonth()===currentMonth &&
expDate.getFullYear()===currentYear
){

if(e.expenseType==="fixed")
fixed += e.amount || 0;

if(e.expenseType==="variable")
variable += e.amount || 0;

}

});

fixed=+fixed.toFixed(2);

variable=+variable.toFixed(2);

fixedTotal.innerText=fixed;

variableTotal.innerText=variable;

totalExpense.innerText=(fixed+variable).toFixed(2);


/* CHART */

new Chart(expenseChart,{

type:"pie",

data:{
labels:["Fixed","Variable"],
datasets:[{
data:[fixed,variable],
backgroundColor:["#8b5cf6","#f97316"]
}]
}

});

}

loadExpenses();

</script>

</body>
</html>
