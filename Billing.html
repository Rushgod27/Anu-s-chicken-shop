<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="stylesheet" href="css/billing.css">

<title>Anu’s Chicken Shop – Billing</title>

</head>

<body>

<div class="pos-container">

<!-- LEFT PANEL -->
<div class="left-panel">

<h2>🐔 Anu’s Chicken Shop – Billing</h2>

<div class="stockBar">
🐔 Broiler: <span id="stockBroiler">0</span> kg |
🐓 Country: <span id="stockCountry">0</span> kg |
🥚 Eggs: <span id="stockEggs">0</span> |
🌶 Masala: <span id="stockMasala">0</span>
</div>


<h3>Today's Prices</h3>

<input type="date" id="saleDate">

<input id="broilerPrice" placeholder="Broiler Price / kg" readonly>
<input id="countryPrice" placeholder="Country Price / kg" readonly>
<input id="eggPrice" placeholder="Egg Price" readonly>

<button onclick="savePrices()">Save Prices</button>


<h3>Add Items</h3>

<button onclick="toggleItem('broiler',this)">Broiler</button>
<button onclick="toggleItem('country',this)">Country</button>
<button onclick="toggleItem('egg',this)">Eggs</button>
<button onclick="toggleItem('masala',this)">Masala</button>


<div id="broilerBox" style="display:none">

<h3>Broiler</h3>

<button onclick="setMode('broiler','kg')">KG</button>
<button onclick="setMode('broiler','rs')">₹</button>

<input id="broilerKg" readonly>
<input id="broilerRs" readonly style="display:none">

</div>


<div id="countryBox" style="display:none">

<h3>Country</h3>

<button onclick="setMode('country','kg')">KG</button>
<button onclick="setMode('country','rs')">₹</button>

<input id="countryKg" readonly>
<input id="countryRs" readonly style="display:none">

</div>


<div id="eggBox" style="display:none">

<h3>Eggs</h3>

<input id="eggQty" readonly>

</div>


<div id="masalaBox" style="display:none">

<h3>Masala</h3>

<input id="masalaAmt" readonly>

</div>


<h3>Payment</h3>

<button onclick="setPayment('cash')">Cash</button>
<button onclick="setPayment('online')">Online</button>

<input id="received" readonly style="display:none">

<div id="returnBox" style="display:none">
Return ₹ <span id="returnAmt">0.00</span>
</div>


<h2>TOTAL ₹ <span id="total">0.00</span></h2>

<button id="saleBtn" onclick="confirmSale()">SALE</button>


<h3>🧾 Today Sales</h3>

<div id="todaySummary"></div>
<div id="todayList">Loading...</div>

</div>


<!-- RIGHT PANEL KEYPAD -->

<div class="right-panel">

<div class="keypad">

<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>

<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>

<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>

<button onclick="add('0')">0</button>
<button onclick="add('.')">.</button>
<button onclick="del()">⌫</button>

</div>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
getFirestore, collection, addDoc, query,
where, orderBy, getDocs, getDoc, serverTimestamp,
updateDoc, doc, increment
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";


initializeApp({
apiKey:"AIzaSyComVLxo36wvogoBFEoWyea-_yESW9BIPU",
authDomain:"anus-chicken-shop.firebaseapp.com",
projectId:"anus-chicken-shop"
});

const db=getFirestore();


/* DATE */

const now=new Date();

const defaultDate=
now.getFullYear()+"-"+
String(now.getMonth()+1).padStart(2,"0")+"-"+
String(now.getDate()).padStart(2,"0");

saleDate.value=defaultDate;

saleDate.addEventListener("change",()=>{
loadTodayPrices();
loadTodaySales();
});


function getSaleDate(){
return saleDate.value || defaultDate;
}


let saleProcessing=false;


/* KEYPAD */

let activeInput=null;


/* DISABLE SYSTEM KEYBOARD */

document.querySelectorAll("input").forEach(i=>{
i.setAttribute("readonly",true);

i.addEventListener("touchstart",e=>{
e.preventDefault();
activeInput=i;
});
});


document.addEventListener("keydown",e=>{
e.preventDefault();
});


window.add=v=>{
if(activeInput){
activeInput.value+=v;
calc();
}
};


window.del=()=>{
if(activeInput){
activeInput.value=activeInput.value.slice(0,-1);
calc();
}
};


/* ITEM TOGGLE */

let active={broiler:false,country:false,egg:false,masala:false};


window.toggleItem=(t,btn)=>{

active[t]=!active[t];

document.getElementById(t+"Box").style.display=
active[t]?"block":"none";

btn.classList.toggle("active");

updateActiveInput();

calc();

};


/* MODE */

let mode={broiler:"kg",country:"kg"};

window.setMode=(t,m)=>{

mode[t]=m;

document.getElementById(t+"Kg").style.display=
m==="kg"?"block":"none";

document.getElementById(t+"Rs").style.display=
m==="rs"?"block":"none";

updateActiveInput();

};


/* PAYMENT */

let payment=null;

window.setPayment=(p)=>{

payment=p;

received.style.display=p==="cash"?"block":"none";
returnBox.style.display=p==="cash"?"block":"none";

updateActiveInput();

};


/* AUTO INPUT SELECT */

function updateActiveInput(){

if(active.broiler && mode.broiler==="kg") activeInput=broilerKg;
else if(active.broiler && mode.broiler==="rs") activeInput=broilerRs;
else if(active.country && mode.country==="kg") activeInput=countryKg;
else if(active.country && mode.country==="rs") activeInput=countryRs;
else if(active.egg) activeInput=eggQty;
else if(active.masala) activeInput=masalaAmt;
else if(payment==="cash") activeInput=received;

}


/* CALCULATE */

function calc(){

let t=0;

if(active.broiler)
t+=(mode.broiler==="kg"
?+broilerKg.value
:(+broilerRs.value/+broilerPrice.value||0))
*+broilerPrice.value;

if(active.country)
t+=(mode.country==="kg"
?+countryKg.value
:(+countryRs.value/+countryPrice.value||0))
*+countryPrice.value;

if(active.egg)
t+=(+eggQty.value||0)*(+eggPrice.value||0);

if(active.masala)
t+=(+masalaAmt.value||0);

total.innerText=t.toFixed(2);

if(payment==="cash"){

const r=(+received.value||0)-t;

returnAmt.innerText=Math.abs(r).toFixed(2);

}

}


/* TODAY SALES */

async function loadTodaySales(){

const q=query(
collection(db,"sales"),
where("date","==",getSaleDate())
);

const snap=await getDocs(q);

let list="";

snap.forEach(d=>{
const s=d.data();

list+=`
<div class="saleCard">
${s.date} — ₹${s.total}
</div>
`;
});

todayList.innerHTML=list || "No sales today";

}


/* LIVE STOCK */

async function loadLiveStock(){

const ref=doc(db,"stock_current","live");

const snap=await getDoc(ref);

const s=snap.data();

stockBroiler.innerText=(s.broiler?.availableKg||0).toFixed(2);
stockCountry.innerText=(s.country?.availableKg||0).toFixed(2);
stockEggs.innerText=(s.eggs?.availableQty||0);
stockMasala.innerText=(s.masala?.availableQty||0);

}


loadTodayPrices();
loadTodaySales();
loadLiveStock();

</script>

</body>
</html>
