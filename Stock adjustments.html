<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stock Reconciliation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>

<body>

<h2>📦 Stock Reconciliation</h2>

<div>

<h3>Adjust Physical Stock</h3>

<div id="reconciliationSection">Loading stock...</div>

</div>

<br>

<div>

<h3>📜 Adjustment History</h3>

<div id="adjustmentLog">Loading...</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
getDoc,
addDoc,
doc,
updateDoc,
increment,
serverTimestamp
}
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";


initializeApp({
apiKey:"AIzaSyComVLxo36wvogoBFEoWyea-_yESW9BIPU",
authDomain:"anus-chicken-shop.firebaseapp.com",
projectId:"anus-chicken-shop"
});

const db = getFirestore();


/* ===============================
LOAD CURRENT STOCK
=============================== */

async function loadStock(){

const container=document.getElementById("reconciliationSection");

try{

const ref = doc(db,"stock_current","live");

const snap = await getDoc(ref);

if(!snap.exists()){
container.innerHTML="Live stock not found";
return;
}

const live = snap.data();

const totals={
broiler:live.broiler?.availableKg||0,
country:live.country?.availableKg||0,
eggs:live.eggs?.availableQty||0,
masala:live.masala?.availableQty||0
};

container.innerHTML = Object.keys(totals).map(item=>`

<div>

<b>${item.toUpperCase()}</b>

<br>

App Stock: <b>${totals[item].toFixed(2)}</b>

<br><br>

<input type="number" step="0.01"
id="physical-${item}"
placeholder="Enter physical count">

<input type="text"
id="reason-${item}"
placeholder="Reason (optional)">

<button onclick="adjust('${item}',${totals[item]})">
Record Adjustment
</button>

</div>

<br>

`).join("");

}catch(e){

console.error(e);

container.innerHTML="Error loading stock";

}

}


/* ===============================
ADJUST STOCK
=============================== */

window.adjust = async(item,current)=>{

const physical = Number(document.getElementById(`physical-${item}`).value)||0;

const reason =
document.getElementById(`reason-${item}`).value ||
"Manual correction";

if(physical < 0){
alert("Invalid quantity");
return;
}

const difference = physical - current;

if(difference === 0){
alert("No difference found");
return;
}

const type = difference > 0 ? "positive" : "negative";

const today = new Date().toISOString().slice(0,10);

try{

/* SAVE ADJUSTMENT LOG */

await addDoc(collection(db,"stock_adjustments"),{

date:today,
item,
quantity:Math.abs(difference),
type,
reason,
createdAt:serverTimestamp()

});


/* UPDATE LIVE STOCK */

const ref = doc(db,"stock_current","live");

if(item==="broiler"){
await updateDoc(ref,{
"broiler.availableKg":increment(difference)
});
}

if(item==="country"){
await updateDoc(ref,{
"country.availableKg":increment(difference)
});
}

if(item==="eggs"){
await updateDoc(ref,{
"eggs.availableQty":increment(difference)
});
}

if(item==="masala"){
await updateDoc(ref,{
"masala.availableQty":increment(difference)
});
}

alert("Stock corrected successfully");

location.reload();

}catch(e){

console.error(e);

alert("Adjustment failed");

}

};


/* ===============================
LOAD ADJUSTMENT HISTORY
=============================== */

async function loadLog(){

try{

const snap = await getDocs(collection(db,"stock_adjustments"));

const container = document.getElementById("adjustmentLog");

if(snap.empty){
container.innerHTML="No adjustments yet";
return;
}

const docs = snap.docs.slice().reverse();

container.innerHTML = docs.map(d=>{

const a = d.data();

return`

<div>

${a.date} – ${a.item.toUpperCase()}

<b>

${a.type==="positive"?"+":"-"}${a.quantity}

</b>

<br>

Reason: ${a.reason||"N/A"}

</div>

<br>

`;

}).join("");

}catch(e){

console.error(e);

}

}


/* ===============================
INITIAL LOAD
=============================== */

loadStock();
loadLog();

</script>

</body>
</html>
