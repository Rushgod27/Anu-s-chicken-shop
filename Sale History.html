<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sales Intelligence Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h2>📊 Anu’s Chicken Shop – Intelligence Dashboard</h2>

<div>

<h3>Date Range Filter</h3>

<input type="date" id="fromDate">
<input type="date" id="toDate">

<button id="loadBtn">Load</button>

</div>

<br>

<div>

<h3>Executive Summary</h3>

<div>
Total Sales ₹ <span id="totalSales">0</span>
</div>

<div>
Total Cost ₹ <span id="totalCost">0</span>
</div>

<div>
Total Profit ₹ <span id="totalProfit">0</span>
</div>

<div>
Profit % <span id="profitPercent">0</span>%
</div>

<div>
Total Bills <span id="totalBills">0</span>
</div>

<div>
Best Product <span id="bestProduct">-</span>
</div>

</div>

<br>

<div>

<h3>Sales & Profit Trend</h3>

<canvas id="salesChart"></canvas>

</div>

<br>

<div>

<h3>Product Profit Contribution</h3>

<canvas id="productPie"></canvas>

</div>

<br>

<div>

<h3>Bills</h3>

<div id="billList">Loading...</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
query,
where
}
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";


initializeApp({
apiKey:"AIzaSyComVLxo36wvogoBFEoWyea-_yESW9BIPU",
authDomain:"anus-chicken-shop.firebaseapp.com",
projectId:"anus-chicken-shop"
});

const db = getFirestore();

let mergedChart = null;
let pieChart = null;


/* DEFAULT DATE */

function todayLocal(){

const d = new Date();

return d.toISOString().slice(0,10);

}

fromDate.value = todayLocal();
toDate.value = todayLocal();

loadBtn.addEventListener("click",loadData);


/* ===============================
LOAD DATA
=============================== */

async function loadData(){

const from = fromDate.value;
const to = toDate.value;

/* FIRESTORE QUERY */

const q = query(
collection(db,"sales"),
where("date",">=",from),
where("date","<=",to)
);

const snap = await getDocs(q);

let totalSales = 0;
let totalCost = 0;
let totalProfit = 0;
let totalBills = 0;

let broilerProfit=0,countryProfit=0,eggProfit=0,masalaProfit=0;

let daily = {};
let bills = [];

snap.forEach(doc=>{

const s = doc.data();

totalSales += Number(s.total||0);
totalCost += Number(s.totalCost||0);
totalProfit += Number(s.profit||0);
totalBills++;

if(!daily[s.date]) daily[s.date]={sales:0,profit:0};

daily[s.date].sales += Number(s.total||0);
daily[s.date].profit += Number(s.profit||0);

if(s.items?.broiler)
broilerProfit += (Number(s.items.broiler.amount||0)-Number(s.items.broiler.cost||0));

if(s.items?.country)
countryProfit += (Number(s.items.country.amount||0)-Number(s.items.country.cost||0));

if(s.items?.eggs)
eggProfit += (Number(s.items.eggs.amount||0)-Number(s.items.eggs.cost||0));

if(s.items?.masala)
masalaProfit += (Number(s.items.masala.amount||0)-Number(s.items.masala.cost||0));

bills.push(s);

});


/* PROFIT % */

const profitPercent = totalSales
? (totalProfit/totalSales*100)
: 0;


/* BEST PRODUCT */

const productProfits = {

Broiler:broilerProfit,
Country:countryProfit,
Eggs:eggProfit,
Masala:masalaProfit

};

const best = Object.keys(productProfits)
.reduce((a,b)=>productProfits[a]>productProfits[b]?a:b,"Broiler");


/* UPDATE UI */

totalSales.innerText = totalSales.toFixed(2);
totalCost.innerText = totalCost.toFixed(2);
totalProfit.innerText = totalProfit.toFixed(2);
profitPercent.innerText = profitPercent.toFixed(2);
totalBills.innerText = totalBills;
bestProduct.innerText = best;


/* CHART DATA */

const labels = Object.keys(daily).sort();

const salesData = labels.map(d=>daily[d].sales);

const profitData = labels.map(d=>daily[d].profit);


if(mergedChart) mergedChart.destroy();
if(pieChart) pieChart.destroy();


mergedChart = new Chart(salesChart,{

type:"line",

data:{
labels,
datasets:[

{
label:"Sales ₹",
data:salesData,
borderColor:"#4f46e5",
tension:0.3
},

{
label:"Profit ₹",
data:profitData,
borderColor:"#16a34a",
tension:0.3
}

]

},

options:{
responsive:true,
scales:{y:{beginAtZero:true}}
}

});


pieChart = new Chart(productPie,{

type:"pie",

data:{
labels:["Broiler","Country","Eggs","Masala"],
datasets:[{
data:[
broilerProfit,
countryProfit,
eggProfit,
masalaProfit
]
}]
}

});


/* BILLS LIST */

bills.sort((a,b)=>
(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)
);

if(bills.length===0){

billList.innerHTML="No Sales";

return;

}

billList.innerHTML = bills.map(s=>`

<div>

${s.date} — ₹${s.total}

</div>

`).join("");

}


loadData();

</script>

</body>
</html>
