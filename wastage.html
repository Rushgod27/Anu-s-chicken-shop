<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wastage Management</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#f1f5f9;
}

.header{
background:#dc2626;
color:white;
padding:18px;
font-size:24px;
font-weight:900;
text-align:center;
}

.container{
max-width:800px;
margin:auto;
padding:16px;
}

.card{
background:white;
padding:18px;
border-radius:16px;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

input,select,button{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
}

button{
background:#dc2626;
color:white;
font-weight:800;
border:none;
cursor:pointer;
}

.log{
background:#f8fafc;
padding:10px;
border-radius:10px;
margin-bottom:8px;
}

</style>
</head>

<body>

<div class="header">⚠ Wastage Management</div>

<div class="container">

<div class="card">

<h3>Add Wastage</h3>

<select id="product">
<option value="broiler">Broiler</option>
<option value="country">Country</option>
<option value="eggs">Eggs</option>
<option value="masala">Masala</option>
</select>

<input type="number" id="qty" placeholder="Quantity">

<select id="reason">
<option value="died">Died</option>
<option value="spoiled">Spoiled</option>
<option value="leftover">Leftover</option>
<option value="damaged">Damaged</option>
<option value="other">Other</option>
</select>

<button onclick="addWastage()">Record Wastage</button>

</div>


<div class="card">

<h3>Wastage History</h3>

<div id="logList">Loading...</div>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
doc,
updateDoc,
increment,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";


initializeApp({
apiKey:"AIzaSyComVLxo36wvogoBFEoWyea-_yESW9BIPU",
authDomain:"anus-chicken-shop.firebaseapp.com",
projectId:"anus-chicken-shop"
});

const db = getFirestore();


/* ADD WASTAGE */

window.addWastage = async () => {

const product = document.getElementById("product").value;
const qty = +document.getElementById("qty").value || 0;
const reason = document.getElementById("reason").value;

if(qty <= 0){
alert("Enter valid quantity");
return;
}

const today = new Date().toISOString().slice(0,10);


/* SAVE WASTAGE LOG */

await addDoc(collection(db,"wastage_logs"),{

product,
quantity:qty,
reason,
date:today,
createdAt:serverTimestamp()

});


/* UPDATE LIVE STOCK */

const ref = doc(db,"stock_current","live");

if(product==="broiler"){

await updateDoc(ref,{
"broiler.availableKg":increment(-qty)
});

}

if(product==="country"){

await updateDoc(ref,{
"country.availableKg":increment(-qty)
});

}

if(product==="eggs"){

await updateDoc(ref,{
"eggs.availableQty":increment(-qty)
});

}

if(product==="masala"){

await updateDoc(ref,{
"masala.availableQty":increment(-qty)
});

}


alert("Wastage recorded");

location.reload();

};



/* LOAD HISTORY */

async function loadLogs(){

const snap = await getDocs(collection(db,"wastage_logs"));

const list = document.getElementById("logList");

if(snap.empty){
list.innerHTML="No wastage records";
return;
}

const docs = snap.docs.slice().reverse();

list.innerHTML = docs.map(d=>{

const w = d.data();

return `
<div class="log">

${w.date} — ${w.product.toUpperCase()}  
Qty: ${w.quantity}  
Reason: ${w.reason}

</div>
`;

}).join("");

}

loadLogs();

</script>

</body>
</html>
