<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wastage Management</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/wastage.css">

</head>

<body>

<h2>⚠ Wastage Management</h2>

<div>

<h3>Add Wastage</h3>

<select id="product">
<option value="broiler">Broiler</option>
<option value="country">Country</option>
<option value="eggs">Eggs</option>
<option value="masala">Masala</option>
</select>

<br><br>

<input type="number" id="qty" placeholder="Quantity">

<br><br>

<select id="reason">
<option value="died">Died</option>
<option value="spoiled">Spoiled</option>
<option value="leftover">Leftover</option>
<option value="damaged">Damaged</option>
<option value="other">Other</option>
</select>

<br><br>

<button onclick="addWastage()">Record Wastage</button>

</div>

<br><br>

<div>

<h3>Wastage History</h3>

<div id="logList">Loading...</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
doc,
updateDoc,
increment,
serverTimestamp,
getDoc
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";


initializeApp({
apiKey:"AIzaSyComVLxo36wvogoBFEoWyea-_yESW9BIPU",
authDomain:"anus-chicken-shop.firebaseapp.com",
projectId:"anus-chicken-shop"
});

const db = getFirestore();


/* ===============================
CHECK STOCK BEFORE WASTAGE
=============================== */

async function checkStock(product,qty){

const ref = doc(db,"stock_current","live");

const snap = await getDoc(ref);

if(!snap.exists()) return true;

const s = snap.data();

let available = 0;

if(product==="broiler") available = s.broiler?.availableKg || 0;
if(product==="country") available = s.country?.availableKg || 0;
if(product==="eggs") available = s.eggs?.availableQty || 0;
if(product==="masala") available = s.masala?.availableQty || 0;

if(qty > available){
throw new Error("Not enough stock available");
}

}


/* ===============================
ADD WASTAGE
=============================== */

window.addWastage = async () => {

const product = document.getElementById("product").value;

const qty = +document.getElementById("qty").value || 0;

const reason = document.getElementById("reason").value;

if(qty <= 0){
alert("Enter valid quantity");
return;
}

try{

await checkStock(product,qty);

const today = new Date().toISOString().slice(0,10);


/* SAVE WASTAGE LOG */

await addDoc(collection(db,"wastage_logs"),{

product,
quantity:qty,
reason,
date:today,
createdAt:serverTimestamp()

});


/* UPDATE LIVE STOCK */

const ref = doc(db,"stock_current","live");

if(product==="broiler"){
await updateDoc(ref,{
"broiler.availableKg":increment(-qty)
});
}

if(product==="country"){
await updateDoc(ref,{
"country.availableKg":increment(-qty)
});
}

if(product==="eggs"){
await updateDoc(ref,{
"eggs.availableQty":increment(-qty)
});
}

if(product==="masala"){
await updateDoc(ref,{
"masala.availableQty":increment(-qty)
});
}

alert("Wastage recorded");

location.reload();

}catch(e){

alert(e.message);

}

};


/* ===============================
LOAD HISTORY
=============================== */

async function loadLogs(){

const snap = await getDocs(collection(db,"wastage_logs"));

const list = document.getElementById("logList");

if(snap.empty){
list.innerHTML="No wastage records";
return;
}

const docs = snap.docs.slice().reverse();

list.innerHTML = docs.map(d=>{

const w = d.data();

return `

<div>

${w.date} — ${w.product.toUpperCase()}

<br>

Qty: ${w.quantity}

<br>

Reason: ${w.reason}

</div>

<br>

`;

}).join("");

}

loadLogs();

</script>

</body>
</html>
