<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/stock.css">
<title>Stock Entry – Inventory</title>
</head>

<body>

<h2>📦 Stock Entry</h2>

<h3>General Details</h3>

<input type="date" id="date">
<br><br>

<input type="text" id="supplier" placeholder="Supplier Name">
<br><br>

<select id="paymentStatus">
<option value="paid">Paid (Cash/Online)</option>
<option value="credit">Credit</option>
</select>

<br><br>

<h3>🐔 Broiler (25% Wastage)</h3>

<input type="number" id="broilerKg" placeholder="Raw KG">
<br>
<input type="number" id="broilerCost" placeholder="Total Cost ₹">

<br><br>

<h3>🐓 Country (No Wastage)</h3>

<input type="number" id="countryKg" placeholder="Raw KG">
<br>
<input type="number" id="countryCost" placeholder="Total Cost ₹">

<br><br>

<h3>🥚 Eggs (1 Tray = 30 Eggs)</h3>

<input type="number" id="eggTrays" placeholder="Number of Trays">
<br>
<input type="number" id="eggCost" placeholder="Total Cost ₹">

<br><br>

<h3>🌶 Masala (Full Pack Only)</h3>

<input type="text" id="masalaBrand" placeholder="Brand Name">
<br>

<input type="text" id="packetSize" placeholder="Packet Size (e.g., 100g)">
<br>

<input type="number" id="masalaQty" placeholder="Number of Packets">
<br>

<input type="number" id="masalaCost" placeholder="Total Cost ₹">

<br><br>

<button onclick="saveStock()">SAVE STOCK ENTRY</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
doc,
updateDoc,
increment,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

initializeApp({
apiKey:"AIzaSyComVLxo36wvogoBFEoWyea-_yESW9BIPU",
authDomain:"anus-chicken-shop.firebaseapp.com",
projectId:"anus-chicken-shop"
});

const db = getFirestore();

/* DEFAULT DATE */

date.value = new Date().toISOString().slice(0,10);

/* ===============================
LIVE STOCK UPDATE
=============================== */

async function increaseLiveStock(type,qty){

const ref = doc(db,"stock_current","live");

if(type==="broiler"){
await updateDoc(ref,{
"broiler.availableKg":increment(qty)
});
}

if(type==="country"){
await updateDoc(ref,{
"country.availableKg":increment(qty)
});
}

if(type==="eggs"){
await updateDoc(ref,{
"eggs.availableQty":increment(qty)
});
}

if(type==="masala"){
await updateDoc(ref,{
"masala.availableQty":increment(qty)
});
}

}

/* ===============================
SAVE STOCK ENTRY
=============================== */

window.saveStock = async () => {

const entryDate = date.value;
const supplierName = supplier.value.trim();
const payment = paymentStatus.value;

if(!entryDate || !supplierName){
alert("Date and Supplier required");
return;
}

/* CHECK IF ANY ITEM ENTERED */

if(
!broilerKg.value &&
!countryKg.value &&
!eggTrays.value &&
!masalaQty.value
){
alert("Enter at least one stock item");
return;
}

const baseData = {
date: entryDate,
supplier: supplierName,
paymentStatus: payment,
payments: [],
status: "active",
createdAt: serverTimestamp()
};

try{

/* BROILER */

if(+broilerKg.value > 0 && +broilerCost.value > 0){

const rawKg = +broilerKg.value;
const totalCost = +broilerCost.value;

const sellableKg = rawKg * 0.75;

if(sellableKg <= 0) throw new Error("Invalid broiler quantity");

const costPerSellableKg = totalCost / sellableKg;

await addDoc(collection(db,"stock_entries"),{
...baseData,
type:"broiler",
rawKg,
wastagePercent:25,
sellableKg,
remainingKg:sellableKg,
totalCost,
costPerSellableKg:+costPerSellableKg.toFixed(2)
});

await increaseLiveStock("broiler",sellableKg);

}

/* COUNTRY */

if(+countryKg.value > 0 && +countryCost.value > 0){

const rawKg = +countryKg.value;
const totalCost = +countryCost.value;

const costPerSellableKg = totalCost / rawKg;

await addDoc(collection(db,"stock_entries"),{
...baseData,
type:"country",
rawKg,
wastagePercent:0,
sellableKg:rawKg,
remainingKg:rawKg,
totalCost,
costPerSellableKg:+costPerSellableKg.toFixed(2)
});

await increaseLiveStock("country",rawKg);

}

/* EGGS */

if(+eggTrays.value > 0 && +eggCost.value > 0){

const trays = +eggTrays.value;
const totalCost = +eggCost.value;

const totalEggs = trays * 30;

const costPerUnit = totalCost / totalEggs;

await addDoc(collection(db,"stock_entries"),{
...baseData,
type:"eggs",
trays,
totalEggs,
remainingQty:totalEggs,
totalCost,
costPerUnit:+costPerUnit.toFixed(2)
});

await increaseLiveStock("eggs",totalEggs);

}

/* MASALA */

if(
masalaBrand.value &&
+masalaQty.value > 0 &&
+masalaCost.value > 0
){

const qty = +masalaQty.value;
const totalCost = +masalaCost.value;

const costPerUnit = totalCost / qty;

await addDoc(collection(db,"stock_entries"),{
...baseData,
type:"masala",
brand:masalaBrand.value.trim(),
packetSize:packetSize.value.trim(),
receivedQty:qty,
remainingQty:qty,
totalCost,
costPerUnit:+costPerUnit.toFixed(2)
});

await increaseLiveStock("masala",qty);

}

alert("Stock entry saved successfully");

location.reload();

}catch(error){

alert("Error saving stock: "+error.message);

}

};

</script>

</body>
</html>
